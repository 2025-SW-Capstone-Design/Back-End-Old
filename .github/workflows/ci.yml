name: CI

on:
  pull_request:
    branches: [ "dev" ]

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make profile config files
        run: |
          echo "$PROPERTIES_PROD" > src/main/resources/application-prod.yml
          echo "$PROPERTIES_AWS_S3" > src/main/resources/application-aws-s3.yml
          echo "$PROPERTIES_EMAIL" > src/main/resources/application-email.yml
          echo "$PROPERTIES_OAUTH" > src/main/resources/application-oauth.yml
          echo "$PROPERTIES_REDIS" > src/main/resources/application-redis.yml
          echo "$PROPERTIES_TEST" > src/main/resources/application-test.yml
        shell: bash
        env:
          PROPERTIES_PROD: ${{ secrets.PROPERTIES_PROD }}
          PROPERTIES_AWS_S3: ${{ secrets.PROPERTIES_AWS_S3 }}
          PROPERTIES_EMAIL: ${{ secrets.PROPERTIES_EMAIL }}
          PROPERTIES_OAUTH: ${{ secrets.PROPERTIES_OAUTH }}
          PROPERTIES_REDIS: ${{ secrets.PROPERTIES_REDIS }}
          PROPERTIES_TEST: ${{ secrets.PROPERTIES_TEST }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      - name: docker image build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/planhub .

      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PW }}

      - name: Docker Hub push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/planhub